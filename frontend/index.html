<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Collector.shop — La seconde main des collectionneurs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ─── Reset & tokens ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #ffffff;
      --bg-soft:      #f7f7f7;
      --surface:      #ffffff;
      --border:       #e8e8e8;
      --border-hover: #c8c8c8;
      --accent:       #09B1BA;
      --accent-dark:  #07959d;
      --accent-light: #e6f8f9;
      --text:         #1A1A1A;
      --text-2:       #4a4a4a;
      --muted:        #888888;
      --green:        #18a058;
      --red:          #e03e3e;
      --shadow-sm:    0 1px 4px rgba(0,0,0,0.07);
      --shadow-md:    0 4px 20px rgba(0,0,0,0.10);
      --shadow-lg:    0 12px 40px rgba(0,0,0,0.14);
      --radius-sm:    6px;
      --radius-md:    10px;
      --radius-lg:    16px;
      --radius-pill:  999px;
      --nav-h:        64px;
      --font:         'Outfit', sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg-soft);
      color: var(--text);
      min-height: 100vh;
    }

    /* ─── NAV ─── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      height: var(--nav-h);
      display: flex;
      align-items: center;
      padding: 0 2rem;
      gap: 1.25rem;
      box-shadow: var(--shadow-sm);
    }

    .nav-logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.5px;
      text-decoration: none;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .nav-logo span {
      color: var(--text);
      font-weight: 400;
    }

    .nav-search {
      flex: 1;
      position: relative;
      max-width: 560px;
    }

    .nav-search svg {
      position: absolute;
      left: 0.85rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    .nav-search input {
      width: 100%;
      height: 40px;
      padding: 0 1rem 0 2.5rem;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-pill);
      font-family: var(--font);
      font-size: 0.875rem;
      color: var(--text);
      background: var(--bg-soft);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .nav-search input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(9,177,186,0.12);
      background: var(--bg);
    }

    .nav-search input::placeholder { color: var(--muted); }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      flex-shrink: 0;
      margin-left: auto;
    }

    .nav-link {
      padding: 0.4rem 0.75rem;
      border-radius: var(--radius-sm);
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-2);
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }

    .nav-link:hover { background: var(--bg-soft); color: var(--text); }

    .btn-sell {
      padding: 0.5rem 1.25rem;
      background: var(--accent);
      color: #fff;
      font-family: var(--font);
      font-size: 0.9rem;
      font-weight: 600;
      border: none;
      border-radius: var(--radius-pill);
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(9,177,186,0.3);
    }

    .btn-sell:hover {
      background: var(--accent-dark);
      box-shadow: 0 4px 14px rgba(9,177,186,0.4);
    }

    .btn-sell:active { transform: scale(0.97); }

    @media (max-width: 600px) {
      nav { padding: 0 1rem; gap: 0.75rem; }
      .nav-links { display: none; }
      .nav-search { max-width: none; }
    }

    /* ─── CATEGORY BAR ─── */
    .category-bar {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .category-bar::-webkit-scrollbar { display: none; }

    .category-inner {
      display: flex;
      gap: 0.5rem;
      padding: 0.625rem 0;
      min-width: max-content;
    }

    .cat-pill {
      padding: 0.35rem 1rem;
      border-radius: var(--radius-pill);
      border: 1.5px solid var(--border);
      font-family: var(--font);
      font-size: 0.825rem;
      font-weight: 500;
      color: var(--text-2);
      background: var(--bg);
      cursor: pointer;
      white-space: nowrap;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
    }

    .cat-pill:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .cat-pill.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ─── MAIN CONTENT ─── */
    .page-wrapper {
      max-width: 1300px;
      margin: 0 auto;
      padding: 1.75rem 2rem 3rem;
    }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }

    .results-title {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
    }

    .results-count {
      font-size: 0.875rem;
      color: var(--muted);
      font-weight: 400;
      margin-left: 0.5rem;
    }

    .sort-select {
      font-family: var(--font);
      font-size: 0.825rem;
      font-weight: 500;
      color: var(--text-2);
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.3rem 0.65rem;
      cursor: pointer;
      outline: none;
    }

    /* ─── ITEM GRID ─── */
    #items-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 1rem;
    }

    @media (max-width: 1100px) { #items-grid { grid-template-columns: repeat(4, 1fr); } }
    @media (max-width: 860px)  { #items-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 580px)  { #items-grid { grid-template-columns: repeat(2, 1fr); } }

    /* ─── ITEM CARD ─── */
    .item-card {
      background: var(--bg);
      border-radius: var(--radius-md);
      overflow: hidden;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      animation: cardIn 0.3s ease both;
    }

    .item-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-md);
      border-color: var(--border-hover);
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-img-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 5;
      background: var(--bg-soft);
      overflow: hidden;
    }

    .card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s;
    }

    .item-card:hover .card-img-wrap img { transform: scale(1.04); }

    .card-img-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      color: var(--muted);
      background: var(--bg-soft);
    }

    .card-fav {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      width: 32px;
      height: 32px;
      background: rgba(255,255,255,0.92);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.18s, transform 0.15s;
      box-shadow: var(--shadow-sm);
    }

    .item-card:hover .card-fav { opacity: 1; }
    .card-fav:hover { transform: scale(1.12); }
    .card-fav.active svg { fill: #e03e3e; stroke: #e03e3e; }

    .card-price-badge {
      position: absolute;
      bottom: 0.5rem;
      left: 0.5rem;
      background: rgba(255,255,255,0.96);
      border-radius: var(--radius-sm);
      padding: 0.2rem 0.55rem;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text);
      box-shadow: var(--shadow-sm);
      backdrop-filter: blur(4px);
    }

    .card-body {
      padding: 0.625rem 0.75rem 0.75rem;
    }

    .card-title {
      font-size: 0.825rem;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 0.3rem;
    }

    .card-meta {
      display: flex;
      gap: 0.35rem;
      flex-wrap: wrap;
    }

    .card-tag {
      font-size: 0.7rem;
      font-weight: 500;
      padding: 0.15rem 0.45rem;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border);
      color: var(--text-2);
      background: var(--bg-soft);
    }

    .card-tag.status-tag {
      color: #b45309;
      background: #fef3c7;
      border-color: #fde68a;
    }

    /* ─── STATES ─── */
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      margin: 3rem auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .state-box {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 1rem;
      color: var(--muted);
    }

    .state-box svg { margin-bottom: 1rem; color: var(--border); }

    .state-box p { font-size: 0.95rem; font-weight: 500; }

    .state-box small { font-size: 0.825rem; margin-top: 0.4rem; display: block; color: var(--muted); }

    /* ─── MODAL ─── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(3px);
      z-index: 200;
      align-items: flex-end;
      justify-content: center;
    }

    .modal-backdrop.open {
      display: flex;
      animation: backdropIn 0.2s ease;
    }

    @keyframes backdropIn { from { opacity: 0; } to { opacity: 1; } }

    .modal {
      background: var(--bg);
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      width: 100%;
      max-width: 580px;
      max-height: 92vh;
      overflow-y: auto;
      padding: 2rem;
      box-shadow: var(--shadow-lg);
      animation: modalUp 0.28s cubic-bezier(0.34, 1.1, 0.64, 1);
    }

    @keyframes modalUp {
      from { transform: translateY(60px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    @media (min-width: 640px) {
      .modal-backdrop { align-items: center; }
      .modal { border-radius: var(--radius-lg); max-height: 90vh; }
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }

    .modal-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
    }

    .modal-close {
      width: 32px;
      height: 32px;
      background: var(--bg-soft);
      border: none;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-2);
      transition: background 0.15s;
    }

    .modal-close:hover { background: var(--border); }

    /* ─── FORM ─── */
    .form-group { margin-bottom: 1rem; }

    .form-label {
      display: block;
      font-size: 0.825rem;
      font-weight: 600;
      color: var(--text-2);
      margin-bottom: 0.35rem;
    }

    .form-input,
    .form-textarea,
    .form-select {
      width: 100%;
      font-family: var(--font);
      font-size: 0.9rem;
      color: var(--text);
      background: var(--bg-soft);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.625rem 0.875rem;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .form-input:focus,
    .form-textarea:focus,
    .form-select:focus {
      border-color: var(--accent);
      background: var(--bg);
      box-shadow: 0 0 0 3px rgba(9,177,186,0.12);
    }

    .form-textarea { resize: vertical; min-height: 90px; }

    .form-select option { background: var(--bg); }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.875rem;
    }

    .btn-submit {
      width: 100%;
      padding: 0.8rem;
      background: var(--accent);
      color: #fff;
      font-family: var(--font);
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: var(--radius-pill);
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      box-shadow: 0 2px 8px rgba(9,177,186,0.3);
    }

    .btn-submit:hover {
      background: var(--accent-dark);
      box-shadow: 0 4px 14px rgba(9,177,186,0.4);
    }

    .btn-submit:active { transform: scale(0.98); }
    .btn-submit:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

    /* ─── FEEDBACK ─── */
    .feedback {
      display: none;
      padding: 0.65rem 0.875rem;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 0.75rem;
    }

    .feedback.success {
      display: block;
      background: #f0fdf4;
      border: 1px solid #86efac;
      color: var(--green);
    }

    .feedback.error {
      display: block;
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: var(--red);
    }
  </style>
</head>
<body>

<!-- ─── NAVIGATION ─── -->
<nav>
  <a class="nav-logo" href="#">collector<span>.shop</span></a>

  <div class="nav-search">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="search" placeholder="Rechercher des articles…" id="search-input" autocomplete="off" />
  </div>

  <div class="nav-links">
    <a class="nav-link" href="#">Parcourir</a>
    <a class="nav-link" href="#">Comment ça marche</a>
  </div>

  <button class="btn-sell" id="open-sell-modal">Vendre</button>
</nav>

<!-- ─── CATEGORY BAR ─── -->
<div class="category-bar">
  <div class="category-inner" id="cat-pills">
    <button class="cat-pill active" data-cat="all">Tous</button>
    <button class="cat-pill" data-cat="Baskets">Baskets</button>
    <button class="cat-pill" data-cat="Vintage">Vintage</button>
    <button class="cat-pill" data-cat="Trading Cards">Trading Cards</button>
    <button class="cat-pill" data-cat="Comics">Comics</button>
    <button class="cat-pill" data-cat="Watches">Montres</button>
    <button class="cat-pill" data-cat="Art">Art</button>
    <button class="cat-pill" data-cat="Other">Autre</button>
  </div>
</div>

<!-- ─── MAIN CONTENT ─── -->
<div class="page-wrapper">
  <div class="results-header">
    <div class="results-title">
      Catalogue <span class="results-count" id="results-count"></span>
    </div>
    <select class="sort-select" id="sort-select">
      <option value="newest">Plus récents</option>
      <option value="price-asc">Prix croissant</option>
      <option value="price-desc">Prix décroissant</option>
    </select>
  </div>

  <div id="items-grid">
    <div class="state-box"><div class="spinner"></div></div>
  </div>
</div>

<!-- ─── SELL MODAL ─── -->
<div class="modal-backdrop" id="modal-backdrop" role="dialog" aria-modal="true" aria-label="Vendre un article">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Mettre en vente</span>
      <button class="modal-close" id="close-sell-modal" aria-label="Fermer">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path d="M18 6 6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <div id="form-feedback" class="feedback" role="alert"></div>

    <form id="sell-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="f-title">Titre *</label>
        <input class="form-input" id="f-title" name="title" type="text"
               placeholder="ex. Air Jordan 1 Chicago – taille 42" required />
      </div>

      <div class="form-group">
        <label class="form-label" for="f-description">Description *</label>
        <textarea class="form-textarea" id="f-description" name="description"
                  placeholder="État, taille, historique de l'article…" required></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="f-price">Prix (€) *</label>
          <input class="form-input" id="f-price" name="price" type="number"
                 min="0" step="0.01" placeholder="0,00" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="f-category">Catégorie *</label>
          <select class="form-select" id="f-category" name="category" required>
            <option value="" disabled selected>Choisir…</option>
            <option>Baskets</option>
            <option>Vintage</option>
            <option>Trading Cards</option>
            <option>Comics</option>
            <option>Watches</option>
            <option>Art</option>
            <option>Other</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="f-photo">URL de la photo *</label>
        <input class="form-input" id="f-photo" name="photo_url" type="url"
               placeholder="https://…" required />
      </div>

      <button class="btn-submit" type="submit" id="submit-btn">Mettre en vente</button>
    </form>
  </div>
</div>

<script>
  const API = '/api/items';

  /* ─── State ─── */
  let allItems = [];
  let activeCategory = 'all';
  let searchQuery = '';
  let sortMode = 'newest';
  let favorites = new Set(JSON.parse(localStorage.getItem('collector_favs') || '[]'));

  /* ─── Helpers ─── */
  function escHtml(str) {
    return String(str ?? '')
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function formatPrice(price) {
    return parseFloat(price).toLocaleString('fr-FR', { style: 'currency', currency: 'EUR' });
  }

  function saveFavs() {
    localStorage.setItem('collector_favs', JSON.stringify([...favorites]));
  }

  /* ─── Render item card ─── */
  function renderCard(item, idx) {
    const id = item.id ?? idx;
    const isFav = favorites.has(String(id));
    const price = formatPrice(item.price);
    const delay = Math.min(idx * 40, 400);

    const imgEl = item.photo_url
      ? `<img src="${escHtml(item.photo_url)}" alt="${escHtml(item.title)}" loading="lazy"
             onerror="this.parentElement.innerHTML='<div class=card-img-placeholder>📦</div>'" />`
      : `<div class="card-img-placeholder">📦</div>`;

    return `
      <article class="item-card" style="animation-delay:${delay}ms" data-id="${escHtml(String(id))}">
        <div class="card-img-wrap">
          ${imgEl}
          <button class="card-fav${isFav ? ' active' : ''}"
                  aria-label="Ajouter aux favoris"
                  onclick="toggleFav(event, '${escHtml(String(id))}')">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="${isFav ? '#e03e3e' : 'none'}"
                 stroke="${isFav ? '#e03e3e' : '#888'}" stroke-width="2">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
          </button>
          <div class="card-price-badge">${price}</div>
        </div>
        <div class="card-body">
          <div class="card-title">${escHtml(item.title)}</div>
          <div class="card-meta">
            <span class="card-tag">${escHtml(item.category)}</span>
            <span class="card-tag status-tag">${escHtml(item.status)}</span>
          </div>
        </div>
      </article>`;
  }

  /* ─── Filter & sort ─── */
  function getFilteredItems() {
    let items = allItems.slice();

    if (activeCategory !== 'all') {
      items = items.filter(i => i.category === activeCategory);
    }

    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      items = items.filter(i =>
        i.title.toLowerCase().includes(q) ||
        i.description.toLowerCase().includes(q) ||
        i.category.toLowerCase().includes(q)
      );
    }

    if (sortMode === 'price-asc')  items.sort((a, b) => a.price - b.price);
    if (sortMode === 'price-desc') items.sort((a, b) => b.price - a.price);

    return items;
  }

  /* ─── Render grid ─── */
  function renderGrid() {
    const grid = document.getElementById('items-grid');
    const items = getFilteredItems();
    const countEl = document.getElementById('results-count');

    if (items.length === 0) {
      countEl.textContent = '';
      if (allItems.length === 0) {
        grid.innerHTML = `
          <div class="state-box">
            <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
              <line x1="3" y1="6" x2="21" y2="6"/>
              <path d="M16 10a4 4 0 0 1-8 0"/>
            </svg>
            <p>Aucun article pour l'instant</p>
            <small>Soyez le premier à mettre un article en vente !</small>
          </div>`;
      } else {
        grid.innerHTML = `
          <div class="state-box">
            <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            <p>Aucun résultat</p>
            <small>Essayez une autre catégorie ou un autre terme de recherche</small>
          </div>`;
      }
      return;
    }

    countEl.textContent = `— ${items.length} article${items.length > 1 ? 's' : ''}`;
    grid.innerHTML = items.map((item, idx) => renderCard(item, idx)).join('');
  }

  /* ─── Fetch items ─── */
  async function loadItems() {
    const grid = document.getElementById('items-grid');
    grid.innerHTML = '<div class="state-box"><div class="spinner"></div></div>';

    try {
      const res = await fetch(API);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      allItems = await res.json();
      renderGrid();
    } catch (err) {
      grid.innerHTML = `
        <div class="state-box" style="color:var(--red)">
          <p>Impossible de charger les articles</p>
          <small>${escHtml(err.message)}</small>
        </div>`;
    }
  }

  /* ─── Favorites toggle ─── */
  function toggleFav(e, id) {
    e.stopPropagation();
    if (favorites.has(id)) {
      favorites.delete(id);
    } else {
      favorites.add(id);
    }
    saveFavs();

    const btn = e.currentTarget;
    const svg = btn.querySelector('svg');
    const isFav = favorites.has(id);
    btn.classList.toggle('active', isFav);
    svg.setAttribute('fill', isFav ? '#e03e3e' : 'none');
    svg.setAttribute('stroke', isFav ? '#e03e3e' : '#888');
  }

  /* ─── Category pills ─── */
  document.getElementById('cat-pills').addEventListener('click', e => {
    const pill = e.target.closest('.cat-pill');
    if (!pill) return;
    document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    activeCategory = pill.dataset.cat;
    renderGrid();
  });

  /* ─── Search ─── */
  let searchTimer;
  document.getElementById('search-input').addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      searchQuery = e.target.value.trim();
      renderGrid();
    }, 220);
  });

  /* ─── Sort ─── */
  document.getElementById('sort-select').addEventListener('change', e => {
    sortMode = e.target.value;
    renderGrid();
  });

  /* ─── Modal ─── */
  const backdrop = document.getElementById('modal-backdrop');

  function openModal() {
    backdrop.classList.add('open');
    document.body.style.overflow = 'hidden';
    document.getElementById('f-title').focus();
  }

  function closeModal() {
    backdrop.classList.remove('open');
    document.body.style.overflow = '';
  }

  document.getElementById('open-sell-modal').addEventListener('click', openModal);
  document.getElementById('close-sell-modal').addEventListener('click', closeModal);

  backdrop.addEventListener('click', e => {
    if (e.target === backdrop) closeModal();
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
  });

  /* ─── Sell form ─── */
  const sellForm = document.getElementById('sell-form');
  const feedback = document.getElementById('form-feedback');
  const submitBtn = document.getElementById('submit-btn');

  function showFeedback(type, msg) {
    feedback.className = `feedback ${type}`;
    feedback.textContent = msg;
    if (type === 'success') {
      setTimeout(() => { feedback.className = 'feedback'; }, 5000);
    }
  }

  sellForm.addEventListener('submit', async e => {
    e.preventDefault();
    submitBtn.disabled = true;
    submitBtn.textContent = 'Publication en cours…';

    const body = {
      title:       sellForm.title.value.trim(),
      description: sellForm.description.value.trim(),
      price:       parseFloat(sellForm.price.value),
      category:    sellForm.category.value,
      photo_url:   sellForm.photo_url.value.trim(),
    };

    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });

      const data = await res.json();

      if (!res.ok) {
        showFeedback('error', data.error ?? `Erreur ${res.status}`);
      } else {
        showFeedback('success', `"${data.title}" mis en vente avec succès !`);
        sellForm.reset();
        await loadItems();
        setTimeout(closeModal, 1800);
      }
    } catch (err) {
      showFeedback('error', `Erreur réseau : ${err.message}`);
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Mettre en vente';
    }
  });

  /* ─── Boot ─── */
  loadItems();
</script>
</body>
</html>
