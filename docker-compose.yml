services:
  db:
    image: postgres:15-alpine
    container_name: collector-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-collector}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-collector_secret}
      POSTGRES_DB: ${POSTGRES_DB:-collector}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-collector}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: collector-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-collector}:${POSTGRES_PASSWORD:-collector_secret}@db:5432/${POSTGRES_DB:-collector}
      PORT: ${PORT:-3000}
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - "${PORT:-3000}:${PORT:-3000}"

  frontend:
    image: nginx:alpine
    container_name: collector-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  db_data:
