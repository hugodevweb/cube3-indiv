name: CI/CD Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ── Job 1: Lint & Test ───────────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests with coverage
        run: npm test -- --coverage

  # ── Job 2: Security Scan ─────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint-and-test
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high

  # ── Job 3: Build Docker Image ─────────────────────────────────────────────────
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t collector-backend:${{ github.sha }} .

  # ── Job 4: Mock Deploy ────────────────────────────────────────────────────────
  mock-deploy:
    name: Mock Deploy
    runs-on: ubuntu-latest
    needs: build-docker

    steps:
      - name: Simulate deployment to staging
        run: |
          echo "========================================"
          echo "  Deploying to staging environment"
          echo "  Image : collector-backend:${{ github.sha }}"
          echo "  Branch: ${{ github.ref_name }}"
          echo "  Actor : ${{ github.actor }}"
          echo "========================================"
          echo "Deployment simulation complete."

      # Optional: push image to GitHub Container Registry
      # - name: Log in to GitHub Container Registry
      #   uses: docker/login-action@v3
      #   with:
      #     registry: ghcr.io
      #     username: ${{ github.actor }}
      #     password: ${{ secrets.GITHUB_TOKEN }}
      #
      # - name: Rebuild and push image to GHCR
      #   run: |
      #     docker build -t ghcr.io/${{ github.repository }}/collector-backend:${{ github.sha }} .
      #     docker push ghcr.io/${{ github.repository }}/collector-backend:${{ github.sha }}

  # ── Job 5: Load Test (JMeter) ─────────────────────────────────────────────
  load-test:
    name: Load Test (JMeter)
    runs-on: ubuntu-latest
    needs: mock-deploy

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start backend stack
        run: docker compose up -d --wait

      - name: Download Apache JMeter
        run: |
          wget -q https://downloads.apache.org/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz
          echo "$PWD/apache-jmeter-5.6.3/bin" >> $GITHUB_PATH

      - name: Run JMeter headless
        run: |
          jmeter -n \
            -t load-tests/test-plan.jmx \
            -JHOST=localhost -JPORT=3000 \
            -l load-tests/results.jtl \
            -e -o load-tests/report

      - name: Upload HTML report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jmeter-html-report
          path: load-tests/report/
